name: Build Android release

on:
  workflow_call:
    inputs:
      release_sha:
        description: Commit SHA selected by Release Please
        required: true
        type: string
      tag_name:
        description: Existing draft release tag, such as v1.4.0
        required: true
        type: string
  workflow_dispatch:
    inputs:
      release_sha:
        description: Commit SHA or ref to build
        required: true
        type: string
      tag_name:
        description: Existing draft release tag, such as v1.4.0
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: android-release-${{ inputs.tag_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out release commit
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.release_sha }}
          fetch-depth: 0

      - name: Verify tag and source version
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ inputs.tag_name }}
        run: |
          source_version="$(tr -d '[:space:]' < version.txt)"
          tag_version="${TAG_NAME#v}"
          if [ "$source_version" != "$tag_version" ]; then
            echo "::error::version.txt ($source_version) does not match tag $TAG_NAME"
            exit 1
          fi

          draft="$(gh release view "$TAG_NAME" --json isDraft --jq .isDraft)"
          if [ "$draft" != "true" ]; then
            echo "::error::GitHub release $TAG_NAME must exist in draft state before building."
            exit 1
          fi

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses >/dev/null

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Ensure scripts are executable
        run: chmod +x gradlew scripts/*.sh

      - name: Build, lint, and test debug app
        run: ./scripts/build-debug.sh assembleDebug lint testDebugUnitTest

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "::error::RELEASE_KEYSTORE_BASE64 secret is not set; cannot sign the release."
            exit 1
          fi
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Build release bundle
        env:
          ORG_GRADLE_PROJECT_MYAPP_RELEASE_STORE_FILE: ${{ runner.temp }}/release.keystore
          ORG_GRADLE_PROJECT_MYAPP_RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          ORG_GRADLE_PROJECT_MYAPP_RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_MYAPP_RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./scripts/build-release.sh bundleRelease lintRelease

      - name: Verify release bundle signature
        run: |
          if jarsigner -verify "app/build/outputs/bundle/release/app-release.aab" | grep -q "jar verified"; then
            echo "Release bundle is signed."
          else
            echo "::error::Release bundle is NOT signed."
            exit 1
          fi

      - name: Prepare release assets
        env:
          TAG_NAME: ${{ inputs.tag_name }}
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk "dist/relaytv-${TAG_NAME}-debug.apk"
          cp app/build/outputs/bundle/release/app-release.aab "dist/relaytv-${TAG_NAME}.aab"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: relaytv-${{ inputs.tag_name }}
          path: dist/*
          if-no-files-found: error

      - name: Upload assets and publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ inputs.tag_name }}
        run: |
          gh release upload "$TAG_NAME" dist/* --clobber
          gh release edit "$TAG_NAME" --draft=false --latest
